version: '3.8'

services:

  registry:
    image: registry:2
    container_name: registry
    ports:
      - "5001:5000"
    environment:
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Origin=["http://172.16.19.77:8080"]
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Methods=["GET","DELETE","HEAD"]
      - REGISTRY_HTTP_HEADERS_Access-Control-Allow-Credentials=[true]
    volumes:
      - registry_data:/var/lib/registry

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: registry-ui
    ports:
      - "8080:80"
    environment:
      - SINGLE_REGISTRY=true
      - REGISTRY_URL=http://172.16.19.77:5001
      - DELETE_IMAGES=true
    depends_on:
      - registry

volumes:
  registry_data:
